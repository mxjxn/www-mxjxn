paragraphs:
  - "I've been making things my whole life. I started playing piano at three and wrote my first program in BASIC in second grade. The creative and the technical have always been the same impulse for me — building something from nothing and seeing what happens when you give it rules."
  - "My career hasn't followed a straight line. I've worked at web agencies, newsrooms, and web3 startups. I've also been a pedicab driver, a bike mechanic, a swim instructor, and a full-time cryptoartist. I tend to leave places that stop challenging me and double down on the ones that do. The most productive years of my life were at Charged Particles — a web3 company where I shipped real products as a developer — until I didn't want to be there anymore. That's a pattern I've come to recognize as a feature, not a bug."
  - "Right now I'm building cryptoart.social, an on-chain auction house and curation platform, and Suchbot, an autonomous AI agent that lives on Farcaster and operates the tools I build. Both of these are the thing they grew out of: years of making art, building community in the cryptoart space, and increasingly thinking about what happens when you give AI systems real autonomy in production."
  - "I'm looking for a role where I can do this at scale — full-stack engineering and agentic AI systems, ideally at a company that values creative people who don't fit a single box."
